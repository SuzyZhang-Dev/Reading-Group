<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>与月言书·共读记录</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
            href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500&family=Lora:ital,wght@0,400;0,500;1,400&family=JetBrains+Mono:wght@300;400&display=swap"
            rel="stylesheet">
    <style>
        :root {
            --paper: #f5f0e8;
            --paper-dark: #ede7d9;
            --ink: #2a2318;
            --ink-light: #6b5f4e;
            --ink-faint: #a89880;
            --accent: #8b4513;
            --accent-light: #c4783a;
            --line: #d8cfc2;
            --playing: #fff3dc;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--paper);
            color: var(--ink);
            font-family: 'Noto Serif SC', serif;
            font-weight: 300;
            min-height: 100vh;
        }

        /* ── Header ── */
        .site-header {
            background: var(--ink);
            color: var(--paper);
            padding: 12px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 3px solid var(--accent);
        }

        .site-logo {
            font-family: 'Lora', serif;
            font-style: italic;
            font-size: 1rem;
            letter-spacing: 0.05em;
            color: var(--ink-faint);
        }

        .site-logo span {
            color: var(--paper);
            font-style: normal;
        }

        .back-link {
            font-size: 0.75rem;
            color: var(--ink-faint);
            text-decoration: none;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            transition: color 0.2s;
        }

        .back-link:hover {
            color: var(--accent-light);
        }

        /* ── Layout ── */
        .page-wrap {
            max-width: 860px;
            margin: 0 auto;
            padding: 0 24px 80px;
        }

        /* ── Episode header ── */
        .episode-header {
            padding: 48px 0 32px;
            border-bottom: 1px solid var(--line);
            margin-bottom: 40px;
        }

        .episode-meta {
            font-size: 0.72rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--ink-faint);
            font-family: 'JetBrains Mono', monospace;
            margin-bottom: 16px;
            display: flex;
            gap: 24px;
        }

        .episode-meta .ep-num {
            color: var(--accent);
            font-weight: 400;
        }

        .episode-title {
            font-family: 'Lora', serif;
            font-size: 2rem;
            font-weight: 500;
            line-height: 1.3;
            color: var(--ink);
            margin-bottom: 12px;
        }

        .episode-subtitle {
            font-size: 0.9rem;
            color: var(--ink-light);
            line-height: 1.8;
        }

        .participants {
            margin-top: 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .participant-tag {
            font-size: 0.72rem;
            padding: 3px 10px;
            border: 1px solid var(--line);
            border-radius: 2px;
            color: var(--ink-light);
            font-family: 'JetBrains Mono', monospace;
            letter-spacing: 0.05em;
        }

        /* ── Audio player ── */
        .audio-section {
            background: var(--ink);
            border-radius: 4px;
            padding: 20px 24px;
            margin-bottom: 40px;
            position: sticky;
            top: 53px;
            z-index: 90;
            box-shadow: 0 4px 24px rgba(42, 35, 24, 0.15);
        }

        .audio-section.is-unstuck {
            position: static;
            box-shadow: none;
            opacity: 0.6;
        }
        font-size: 0.68rem;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        color: var(--ink-faint);
        font-family: 'JetBrains Mono', monospace;
        margin-bottom: 12px;
        }

        .player-controls {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .play-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: none;
            background: var(--accent);
            color: var(--paper);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: background 0.2s, transform 0.1s;
        }

        .play-btn:hover {
            background: var(--accent-light);
        }

        .play-btn:active {
            transform: scale(0.95);
        }

        .play-btn svg {
            width: 16px;
            height: 16px;
            fill: currentColor;
        }

        .player-info {
            flex: 1;
            min-width: 0;
        }

        .now-playing {
            font-size: 0.75rem;
            color: var(--paper);
            margin-bottom: 8px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-family: 'Noto Serif SC', serif;
        }

        .now-playing em {
            color: var(--accent-light);
            font-style: normal;
        }

        .progress-wrap {
            position: relative;
            height: 3px;
            background: rgba(255, 255, 255, 0.12);
            border-radius: 2px;
            cursor: pointer;
        }

        .progress-bar {
            height: 100%;
            background: var(--accent);
            border-radius: 2px;
            width: 0%;
            transition: width 0.1s linear;
            pointer-events: none;
        }

        .progress-wrap:hover .progress-bar {
            background: var(--accent-light);
        }

        .time-display {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.68rem;
            color: var(--ink-faint);
            margin-top: 6px;
            letter-spacing: 0.05em;
        }

        /* ── Transcript ── */
        .transcript-label {
            font-size: 0.72rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--ink-faint);
            font-family: 'JetBrains Mono', monospace;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .transcript-label::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--line);
        }

        .tip {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.68rem;
            color: var(--ink-faint);
            text-align: center;
            margin-bottom: 24px;
            letter-spacing: 0.08em;
        }

        .tip span {
            border: 1px solid var(--line);
            padding: 4px 10px;
            border-radius: 2px;
        }

        .transcript {
            display: flex;
            flex-direction: column;
        }

        .segment {
            display: grid;
            grid-template-columns: 90px 1fr;
            gap: 0 20px;
            padding: 14px 0;
            border-bottom: 1px solid var(--line);
            cursor: pointer;
            transition: background 0.15s;
            border-radius: 2px;
            position: relative;
        }

        .segment:hover {
            background: var(--paper-dark);
            padding-left: 8px;
            padding-right: 8px;
            margin: 0 -8px;
        }

        .segment.is-playing {
            background: var(--playing);
            padding-left: 8px;
            padding-right: 8px;
            margin: 0 -8px;
        }

        .segment.is-playing::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 3px;
            background: var(--accent);
            border-radius: 2px 0 0 2px;
        }

        .seg-left {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            padding-top: 2px;
            gap: 4px;
            flex-shrink: 0;
        }

        .seg-speaker {
            font-size: 0.78rem;
            font-weight: 500;
            color: var(--accent);
            white-space: nowrap;
            letter-spacing: 0.03em;
        }

        .seg-time {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.65rem;
            color: var(--ink-faint);
            letter-spacing: 0.05em;
        }

        .segment:hover .seg-time {
            color: var(--accent-light);
        }

        .seg-text {
            font-size: 0.92rem;
            line-height: 2;
            color: var(--ink);
            font-weight: 300;
        }

        /* ── Header nav ── */
        .header-nav {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .header-nav a {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            text-decoration: none;
            color: var(--ink-faint);
            padding: 5px 12px;
            border: 1px solid transparent;
            border-radius: 2px;
            transition: all 0.15s;
        }

        .header-nav a:hover {
            color: var(--paper);
            border-color: rgba(255,255,255,0.2);
        }

        .header-nav .divider {
            color: var(--ink-faint);
            font-size: 0.6rem;
            opacity: 0.4;
        }

        /* ── Page nav ── */
        .page-nav {
            display: flex;
            gap: 8px;
            margin-bottom: 40px;
        }

        .page-nav a {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            text-decoration: none;
            color: var(--ink-light);
            padding: 6px 16px;
            border: 1px solid var(--line);
            border-radius: 2px;
            transition: all 0.15s;
        }

        .page-nav a:hover {
            background: var(--ink);
            color: var(--paper);
            border-color: var(--ink);
        }

        /* ── Reviews section ── */
        .reviews-section {
            margin-top: 72px;
            padding-top: 48px;
            border-top: 2px solid var(--ink);
        }

        .reviews-label {
            font-size: 0.72rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--ink-faint);
            font-family: 'JetBrains Mono', monospace;
            margin-bottom: 32px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .reviews-label::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--line);
        }

        .reviews-masonry {
            columns: 2;
            column-gap: 20px;
        }

        @media (max-width: 600px) {
            .reviews-masonry {
                columns: 1;
            }
        }

        .review-card {
            break-inside: avoid;
            margin-bottom: 20px;
            background: var(--paper-dark);
            border: 1px solid var(--line);
            border-radius: 2px;
            padding: 24px 24px 20px;
            position: relative;
        }

        /* 大引号装饰 */
        .review-card::before {
            content: '\201C';
            font-family: 'Lora', serif;
            font-size: 4rem;
            line-height: 1;
            color: var(--line);
            position: absolute;
            top: 8px;
            right: 16px;
            pointer-events: none;
        }

        .review-author {
            font-size: 0.75rem;
            font-weight: 500;
            color: var(--accent);
            font-family: 'JetBrains Mono', monospace;
            letter-spacing: 0.05em;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .review-author::before {
            content: '';
            display: inline-block;
            width: 16px;
            height: 1px;
            background: var(--accent);
            flex-shrink: 0;
        }

        .review-text {
            font-size: 0.88rem;
            line-height: 1.9;
            color: var(--ink-light);
            font-weight: 300;
            white-space: pre-wrap;
        }

        /* ── Loading / Error states ── */
        .state-msg {
            text-align: center;
            padding: 60px 0;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            color: var(--ink-faint);
            letter-spacing: 0.08em;
        }

        /* ── Scrollbar ── */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: var(--paper-dark);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--line);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--ink-faint);
        }
    </style>
</head>

<body>

<header class="site-header">
    <div class="site-logo">与月言书 · 读书会档案</div>
    <div class="header-nav">
        <a href="#episode-title">语音记录</a>
        <span class="divider">·</span>
        <a href="#reviews-section">文字书评</a>
<!--        <span class="divider">|</span>-->
<!--        <a class="back-link" href="../../index.html">← 所有期次</a>-->
    </div>
</header>

<div class="page-wrap">

    <!-- 元数据区域，由 JS 填充 -->
    <div class="episode-header">
        <div class="episode-meta" id="epMeta">
            <span class="ep-num">Vol.01</span>
            <span>2026 · 03 · 22</span>
            <span>01:54:13</span>
        </div>
        <h1 class="episode-title" id="episode-title">《进烤箱的日子》线上共读记录</h1>
        <p class="episode-subtitle">
            李佳颖 · 2024年台湾出版<br>
        </p>
        <div class="participants" id="participants">
            <!-- 由 JS 动态生成 -->
        </div>
    </div>

    <!-- 音频播放器 -->
    <div class="audio-section">
        <div class="player-label">音频播放</div>
        <div class="player-controls">
            <button class="play-btn" id="playBtn" onclick="togglePlay()">
                <svg id="playIcon" viewBox="0 0 24 24">
                    <path d="M8 5v14l11-7z" />
                </svg>
            </button>
            <div class="player-info">
                <div class="now-playing" id="nowPlaying">点击下方段落跳转 · 或直接播放（正文从6:23）开始</div>
                <div class="progress-wrap" id="progressWrap" onclick="seekAudio(event)">
                    <div class="progress-bar" id="progressBar"></div>
                </div>
                <div class="time-display" id="timeDisplay">00:00 / --:--</div>
            </div>
        </div>
    </div>

    <!-- 文稿 -->
    <div class="tip"><span>点击任意段落 → 跳转音频</span></div>
    <div class="transcript-label" id="transcript-section">文字记录</div>
    <div class="transcript" id="transcript">
        <div class="state-msg" id="stateMsg">加载中…</div>
    </div>

    <div class="reviews-section" id="reviews-section">
        <div class="reviews-label">文字书评</div>
        <div class="reviews-masonry" id="reviewsMasonry">
            <div class="state-msg" id="reviewsMsg">加载中…</div>
        </div>
    </div>

</div>

<audio id="audioPlayer" preload="metadata">
    <source src="./audio.m4a" type="audio/mp4">
</audio>

<script>
    // ─────────────────────────────────────────────
    //  配置区：每期只需修改这里
    // ─────────────────────────────────────────────
    const EPISODE = {
        audioSrc: './audio.m4a',   // 替换为音频 URL，留空则进入演示模式
        jsonPath: './record.json',
        reviewsPath: './reviews.json',
    };

    // ─────────────────────────────────────────────
    //  DOM 引用
    // ─────────────────────────────────────────────
    const audio = document.getElementById('audioPlayer');
    const playIcon = document.getElementById('playIcon');
    const progressBar = document.getElementById('progressBar');
    const progressWrap = document.getElementById('progressWrap');
    const timeDisplay = document.getElementById('timeDisplay');
    const nowPlaying = document.getElementById('nowPlaying');
    const transcriptEl = document.getElementById('transcript');
    const stateMsg = document.getElementById('stateMsg');

    const PLAY_ICON = `<path d="M8 5v14l11-7z"/>`;
    const PAUSE_ICON = `<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>`;

    let currentSegment = null;
    let segments = [];        // DOM 节点缓存，供 timeupdate 查找
    let demoMode = !EPISODE.audioSrc;

    // ─────────────────────────────────────────────
    //  音频初始化
    // ─────────────────────────────────────────────
    if (EPISODE.audioSrc) {
        audio.querySelector('source').src = EPISODE.audioSrc;
        audio.load();
    }

    // ─────────────────────────────────────────────
    //  从 record.json 加载并渲染文稿
    // ─────────────────────────────────────────────
    async function loadTranscript() {
        try {
            const res = await fetch(EPISODE.jsonPath);
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const data = await res.json();

            stateMsg.remove();
            renderTranscript(data);
            renderParticipants(data);
        } catch (err) {
            stateMsg.textContent = `文稿加载失败：${err.message}`;
            console.error(err);
        }
    }

    function renderTranscript(data) {
        const frag = document.createDocumentFragment();

        data.forEach(item => {
            const div = document.createElement('div');
            div.className = 'segment';
            div.dataset.time = item.seconds;
            div.onclick = () => jumpTo(div);

            div.innerHTML = `
      <div class="seg-left">
        <span class="seg-speaker">${escHtml(item.speaker)}</span>
        <span class="seg-time">${escHtml(item.time)}</span>
      </div>
      <div class="seg-text">${escHtml(item.text)}</div>
    `;
            frag.appendChild(div);
        });

        transcriptEl.appendChild(frag);
        // 缓存所有 segment 节点，避免 timeupdate 里反复 querySelectorAll
        segments = Array.from(transcriptEl.querySelectorAll('.segment'));
    }

    function renderParticipants(data) {
        const names = [...new Set(data.map(d => d.speaker))];
        const container = document.getElementById('participants');
        container.innerHTML =
            `<span class="participant-tag" style="color:var(--ink-faint);border-color:transparent">讨论人</span>` +
            names.map(n => `<span class="participant-tag">${escHtml(n)}</span>`).join('');
    }

    function escHtml(str) {
        return String(str)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;');
    }

    // ─────────────────────────────────────────────
    //  播放器交互
    // ─────────────────────────────────────────────
    function formatTime(s) {
        if (!isFinite(s)) return '--:--';
        const h = Math.floor(s / 3600);
        const m = Math.floor((s % 3600) / 60);
        const sec = Math.floor(s % 60);
        if (h > 0) return `${h}:${String(m).padStart(2, '0')}:${String(sec).padStart(2, '0')}`;
        return `${String(m).padStart(2, '0')}:${String(sec).padStart(2, '0')}`;
    }

    function highlightSegment(el) {
        if (currentSegment === el) return;
        if (currentSegment) currentSegment.classList.remove('is-playing');
        currentSegment = el;
        el.classList.add('is-playing');
    }

    function jumpTo(el) {
        const secs = parseInt(el.dataset.time, 10);
        const speaker = el.querySelector('.seg-speaker').textContent;
        const timeStr = el.querySelector('.seg-time').textContent;

        highlightSegment(el);
        nowPlaying.innerHTML = `<em>${escHtml(speaker)}</em> · ${escHtml(timeStr)}`;
        el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

        if (demoMode) {
            // 演示模式：仅模拟进度条
            const totalSecs = 6853; // 1:54:13
            progressBar.style.width = (secs / totalSecs * 100) + '%';
            timeDisplay.textContent = `${formatTime(secs)} / 01:54:13`;
            playIcon.innerHTML = PAUSE_ICON;
            return;
        }

        audio.currentTime = secs;
        audio.play();
    }

    function togglePlay() {
        if (demoMode) {
            const isPlaying = playIcon.innerHTML.includes('M6 19');
            playIcon.innerHTML = isPlaying ? PLAY_ICON : PAUSE_ICON;
            if (!isPlaying) nowPlaying.textContent = '演示模式 · 请在 EPISODE.audioSrc 填入音频链接';
            return;
        }
        audio.paused ? audio.play() : audio.pause();
    }

    function seekAudio(e) {
        if (demoMode || !audio.duration) return;
        const rect = progressWrap.getBoundingClientRect();
        audio.currentTime = ((e.clientX - rect.left) / rect.width) * audio.duration;
    }

    // ─────────────────────────────────────────────
    //  音频事件
    // ─────────────────────────────────────────────
    audio.addEventListener('play', () => { playIcon.innerHTML = PAUSE_ICON; demoMode = false; });
    audio.addEventListener('pause', () => { playIcon.innerHTML = PLAY_ICON; });
    audio.addEventListener('loadedmetadata', () => {
        timeDisplay.textContent = `00:00 / ${formatTime(audio.duration)}`;
    });

    audio.addEventListener('timeupdate', () => {
        if (!audio.duration) return;
        progressBar.style.width = (audio.currentTime / audio.duration * 100) + '%';
        timeDisplay.textContent = `${formatTime(audio.currentTime)} / ${formatTime(audio.duration)}`;

        // 找到当前时间对应的最后一个段落并高亮
        let active = null;
        for (const seg of segments) {
            if (audio.currentTime >= parseInt(seg.dataset.time, 10)) active = seg;
            else break;
        }
        if (active) highlightSegment(active);
    });

    async function loadReviews() {
        const masonry = document.getElementById('reviewsMasonry');
        const msg = document.getElementById('reviewsMsg');
        try {
            const res = await fetch(EPISODE.reviewsPath);
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const data = await res.json();
            msg.remove();
            const frag = document.createDocumentFragment();
            data.forEach(item => {
                const card = document.createElement('div');
                card.className = 'review-card';
                card.innerHTML = `
                <div class="review-author">${escHtml(item.author)}</div>
                <div class="review-text">${escHtml(item.text)}</div>
            `;
                frag.appendChild(card);
            });
            masonry.appendChild(frag);
        } catch (err) {
            msg.textContent = `书评加载失败：${err.message}`;
            console.error(err);
        }
    }

    // ─────────────────────────────────────────────
    //  播放器到书评区停止悬浮
    // ─────────────────────────────────────────────
    const audioSection = document.getElementById('audioPlayer').closest
        ? document.querySelector('.audio-section')
        : null;

    function updatePlayerSticky() {
        const reviewsEl = document.getElementById('reviews-section');
        const playerEl  = document.querySelector('.audio-section');
        if (!reviewsEl || !playerEl) return;
        const reviewsTop = reviewsEl.getBoundingClientRect().top;
        if (reviewsTop <= window.innerHeight * 0.5) {
            playerEl.classList.add('is-unstuck');
        } else {
            playerEl.classList.remove('is-unstuck');
        }
    }

    window.addEventListener('scroll', updatePlayerSticky, { passive: true });

    // ─────────────────────────────────────────────
    //  启动
    // ─────────────────────────────────────────────
    loadTranscript();
    loadReviews();
